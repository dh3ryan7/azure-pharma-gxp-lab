<text x="30" y="340" font-size="10.5" fill="#0f172a">Shared flow:  Internet →:443 Corporate/Web →:8443 Application →:1433 Database   ·   R&amp;D + Management isolated</text>
<text x="30" y="360" font-size="10.5" fill="#2563eb">Dept flow:  QA →:443 oversees QC · MFG · PKG     QC →:8443 MFG     MFG ↔:8443 PKG     mgmt →:22/3389 all</text>
<text x="30" y="380" font-size="10.5" fill="#475569">Each department NSG ends with deny-all (priority 4000) — enforces GxP segregation of Quality vs Operations</text>

<text x="14" y="430" font-size="13" font-weight="700" fill="#0f172a">Data, secrets &amp; monitoring</text>
